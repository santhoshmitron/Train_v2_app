cube-name = jio.rtrs.finl_r_join.finl_r_test

cube-version = "1.0"

squbs-actors = [



  {
    class-name = jio.rtrs.pigeon.kafka.KafkaFinLConsumer
    name = FINL_Consumer
  },
  {
    class-name = jio.rtrs.pigeon.kafka.KafkaFinRConsumer
    name = FINR_Consumer
  },
  {
    class-name = jio.rtrs.pigeon.finlr.receiver.FINLR_KafkaToActorClusterProducer
    name = FINLR_Receiver
    message-class = [
      {
        request = jio.rtrs.pigeon.pojo.KafkaSMSMessage
      }
    ]
  }
]

squbs-services = [
  {
    class-name = jio.rtrs.pigeon.api.HealthController
    name= HealthCheck
    web-context = "health"

  }
  ]